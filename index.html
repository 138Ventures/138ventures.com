<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>138 Ventures</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Libre+Franklin:wght@200;300;400&display=swap');

  :root {
    --bg: #0A0C11;
    --text: #D8DBE2;
    --text-mid: #B0B4BD;
    --text-dim: #949AA5;
    --text-quiet: #7D828D;
    --sheen: rgba(200, 205, 215, 0.012);
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Libre Franklin', 'Helvetica Neue', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 1;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, transparent 35%, var(--sheen) 45%, rgba(200,205,215,0.022) 50%, var(--sheen) 55%, transparent 65%, transparent 100%);
    pointer-events: none;
    z-index: 2;
  }

  .page { position: relative; z-index: 3; height: 100vh; display: flex; flex-direction: column; }

  .header {
    padding: 2rem 4vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    animation: fadeIn 1s ease 0.3s forwards;
  }

  .mark { display: flex; align-items: baseline; }
  .mark-num { font-family: var(--serif); color: var(--text); font-size: 1.15rem; }
  .mark-num .w4 { font-weight: 400; }
  .mark-num .w6 { font-weight: 600; }
  .mark-num .w7 { font-weight: 700; }
  .mark-v { font-family: var(--sans); font-weight: 300; font-size: 0.62rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--text-dim); margin-left: 0.85rem; }

  .header-email { font-family: var(--sans); font-weight: 300; font-size: 0.62rem; letter-spacing: 0.12em; color: var(--text-dim); text-decoration: none; transition: color 0.4s; }
  .header-email:hover { color: var(--text); }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    z-index: 4;
  }

  .main::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    width: 55vw;
    height: 55vh;
    max-width: 700px;
    max-height: 500px;
    background: radial-gradient(ellipse at center, rgba(180,185,200,0.04) 0%, rgba(160,165,180,0.02) 30%, transparent 65%);
    pointer-events: none;
    z-index: -1;
  }

  .identity-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
  }

  .numerals { display: flex; align-items: baseline; margin-bottom: 0.6rem; }

  .n1 { font-family: var(--serif); font-weight: 400; font-size: clamp(5.5rem, 13vw, 10rem); color: var(--text); line-height: 0.82; }
  .n3 { font-family: var(--serif); font-weight: 600; font-size: clamp(5.5rem, 13vw, 10rem); color: var(--text); line-height: 0.82; }
  .n8 { font-family: var(--serif); font-weight: 700; font-size: clamp(5.5rem, 13vw, 10rem); color: var(--text); line-height: 0.82; }

  /* Shimmer: staggered glow, subtle but visible */
  .n1 { animation: fadeUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards, shimmer 12s ease-in-out 4s infinite; }
  .n3 { animation: fadeUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards, shimmer 12s ease-in-out 5s infinite; }
  .n8 { animation: fadeUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards, shimmer 12s ease-in-out 6s infinite; }

  @keyframes shimmer {
    0% { color: #D8DBE2; text-shadow: none; }
    15% { color: #FFFFFF; text-shadow: 0 0 12px rgba(255,255,255,0.15); }
    30% { color: #D8DBE2; text-shadow: none; }
    100% { color: #D8DBE2; text-shadow: none; }
  }

  .ventures {
    font-family: var(--sans);
    font-weight: 200;
    font-size: clamp(0.75rem, 1.2vw, 0.95rem);
    letter-spacing: 0.55em;
    text-indent: 0.55em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(1.05rem, 1.8vw, 1.35rem);
    line-height: 1.6;
    color: var(--text-mid);
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
  }

  .info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
  }

  .location { font-family: var(--sans); font-weight: 300; font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-dim); }

  .footer {
    padding: 1.5rem 4vw;
    display: flex;
    justify-content: space-between;
    position: relative;
    z-index: 4;
    opacity: 0;
    animation: fadeIn 1s ease 2s forwards;
  }
  .footer span { font-family: var(--sans); font-weight: 300; font-size: 0.55rem; letter-spacing: 0.1em; color: var(--text-quiet); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 600px) {
    .header { padding: 1.5rem; }
    .mark-v { display: none; }
    .footer { padding: 1.5rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .n1, .n3, .n8 { animation: fadeUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards !important; }
  }
</style>
</head>
<body>

<div class="page">
  <header class="header">
    <div class="mark">
      <span class="mark-num"><span class="w4">1</span><span class="w6">3</span><span class="w7">8</span></span>
      <span class="mark-v">Ventures</span>
    </div>
    <a class="header-email" id="eml" href="#">·</a>
  </header>

  <main class="main">
    <div class="identity-block">
      <div class="numerals">
        <span class="n1">1</span><span class="n3">3</span><span class="n8">8</span>
      </div>
      <div class="ventures">Ventures</div>
    </div>
    <div class="tagline">Enduring prosperity. Built over time.</div>
    <div class="info">
      <div class="location">Singapore</div>
    </div>
  </main>

  <div class="footer">
    <span>&copy; 2026 138 Ventures Pte. Ltd.</span>
    <span>Advisory &amp; Investment</span>
  </div>
</div>

<script>
(function(){var a='info',b='138ventures.com',e=document.getElementById('eml');e.href='mai'+'lto:'+a+'@'+b;e.textContent=a+'@'+b;})();
</script>

</body>
</html>
